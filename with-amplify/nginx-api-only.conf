# /etc/nginx/conf.d/interviewcoach.conf
# Solution AVEC Amplify — nginx expose UNIQUEMENT l'API .NET
# Le frontend est géré par Amplify, pas par ce serveur.
#
# Installation :
#   sudo cp nginx-api-only.conf /etc/nginx/conf.d/interviewcoach.conf
#   sudo nginx -t && sudo systemctl reload nginx

upstream api_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    access_log /var/log/nginx/interviewcoach_access.log combined;
    error_log  /var/log/nginx/interviewcoach_error.log warn;

    # ── Health checks ──────────────────────────────────────────────────────
    location ~ ^/(health|alive)$ {
        proxy_pass            http://api_backend;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout    10s;
        proxy_connect_timeout 5s;
    }

    # ── SSE streaming (feedback IA) ────────────────────────────────────────
    # proxy_buffering off = tokens envoyés mot par mot
    # CloudFront doit aussi avoir Compress=No sur ce behavior
    location ~ ^/api/sessions/[^/]+/questions/[^/]+/answer$ {
        proxy_pass            http://api_backend;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header      X-Fingerprint     $http_x_fingerprint;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
        chunked_transfer_encoding on;
        gzip                  off;
        add_header            X-Accel-Buffering no always;
    }

    # ── API .NET (toutes les routes) ───────────────────────────────────────
    location /api/ {
        proxy_pass            http://api_backend;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header      X-Fingerprint     $http_x_fingerprint;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         16 8k;
        client_max_body_size  10m;
    }

    # Bloquer tout ce qui n'est pas l'API (le frontend est sur Amplify)
    location / {
        return 404;
    }
}
