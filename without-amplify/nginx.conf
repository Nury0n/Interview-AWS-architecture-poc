# /etc/nginx/conf.d/interviewcoach.conf
# Solution SANS Amplify
#
# Reverse proxy unique vers :
#   - API .NET  127.0.0.1:5000  (/api/*, /health, /alive)
#   - Next.js   127.0.0.1:3000  (tout le reste)
#
# Installation :
#   sudo cp nginx.conf /etc/nginx/conf.d/interviewcoach.conf
#   sudo nginx -t && sudo systemctl reload nginx

upstream api_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

upstream web_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    access_log /var/log/nginx/interviewcoach_access.log combined;
    error_log  /var/log/nginx/interviewcoach_error.log warn;

    # ── Health checks ──────────────────────────────────────────────────────
    location ~ ^/(health|alive)$ {
        proxy_pass            http://api_backend;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout    10s;
        proxy_connect_timeout 5s;
    }

    # ── SSE streaming (feedback IA) ────────────────────────────────────────
    # proxy_buffering off = tokens envoyés mot par mot au navigateur
    location ~ ^/api/sessions/[^/]+/questions/[^/]+/answer$ {
        proxy_pass            http://api_backend;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header      X-Fingerprint     $http_x_fingerprint;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
        chunked_transfer_encoding on;
        gzip                  off;
        add_header            X-Accel-Buffering no always;
    }

    # ── API .NET ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass            http://api_backend;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header      X-Fingerprint     $http_x_fingerprint;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         16 8k;
        client_max_body_size  10m;
    }

    # ── Frontend Next.js ───────────────────────────────────────────────────
    location / {
        proxy_pass            http://web_frontend;
        proxy_http_version    1.1;
        proxy_set_header      Connection        "";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout    30s;
        proxy_connect_timeout 5s;

        # Assets statiques Next.js — cache 1 jour (hash dans le nom = invalidation auto)
        location /_next/static/ {
            proxy_pass         http://web_frontend;
            add_header         Cache-Control "public, max-age=86400, immutable";
        }
    }
}
